<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>writing — owen kleinmaier</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg-primary: #faf9f7;
      --bg-secondary: #f5f4f1;
      --bg-tertiary: #ffffff;
      --text-primary: #2c2c2c;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent-primary: #24637e;
      --accent-secondary: #2f7a99;
      --border-light: #e8e5e0;
      --shadow-light: rgba(0, 0, 0, 0.05);
      --shadow-medium: rgba(0, 0, 0, 0.1);
    }

    .dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #cccccc;
      --text-muted: #888888;
      --accent-primary: #24637e;
      --accent-secondary: #2f7a99;
      --border-light: #404040;
      --shadow-light: rgba(0, 0, 0, 0.2);
      --shadow-medium: rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "JetBrains Mono", monospace;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      font-size: 14px;
      font-weight: 400;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      padding: 4px;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .theme-toggle:hover { color: var(--accent-primary); }

    .nav {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      background: var(--bg-tertiary);
      padding: 12px 24px;
      border-radius: 16px;
      border: 1px solid var(--border-light);
      box-shadow: 0 2px 16px var(--shadow-light);
      backdrop-filter: blur(10px);
    }

    .nav-links { display: flex; gap: 24px; }

    .nav-theme-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      padding: 4px;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .nav-theme-toggle:hover { color: var(--accent-primary); }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      transition: color 0.2s ease;
    }

    .nav-link:hover { color: var(--accent-primary); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 120px 80px;
    }

    .section-title {
      font-size: 32px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 40px;
      letter-spacing: -0.01em;
    }

    .posts-grid { display: grid; gap: 24px; }

    .post-card {
      padding: 24px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      transition: all 0.2s ease;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--shadow-medium);
      border-color: var(--accent-primary);
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 16px;
    }

    .post-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      margin: 0;
    }

    .post-read-link {
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--border-light);
      padding: 4px 12px;
      border-radius: 8px;
      background: var(--bg-secondary);
      white-space: nowrap;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .post-card:hover .post-read-link {
      color: var(--accent-primary);
      border-color: var(--accent-primary);
      background: var(--bg-primary);
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-tag {
      font-size: 10px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 400;
      border: 1px solid var(--border-light);
    }

    @media (max-width: 768px) {
      .theme-toggle { display: none; }

      .nav {
        position: static;
        transform: none;
        margin: 20px auto 0 auto;
        max-width: calc(100% - 40px);
        width: calc(100% - 40px);
        justify-content: space-between;
        padding: 12px 16px;
      }

      .nav-links {
        flex: 1;
        display: flex;
        justify-content: center;
        gap: 16px;
      }

      .nav-theme-toggle {
        display: block;
        position: static;
        transform: none;
        flex-shrink: 0;
      }

      .container { padding: 40px 24px 60px; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
  <i class="fas fa-moon" id="theme-icon"></i>
</button>

<nav class="nav">
  <div class="nav-links">
    <a href="/" class="nav-link">home</a>
    <a href="/#about" class="nav-link">about</a>
    <a href="/#skills" class="nav-link">skills</a>
    <a href="/#projects" class="nav-link">projects</a>
    <a href="/blogs" class="nav-link">blogs</a>
  </div>
  <button class="nav-theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon" id="nav-theme-icon"></i>
  </button>
</nav>

<div class="container">
  <h2 class="section-title">writing</h2>
  <div class="posts-grid" id="posts-grid"></div>
</div>

<script>
  // add new posts here — one object per post
  const posts = [
    {
      title: "We Don't Know What Our AI Is Doing",
      date: "March 2026",
      tag: "opinion",
      readTime: "~6 min read",
      href: "/blogs/black-box-ai.html",
    },
  ];

  const grid = document.getElementById("posts-grid");
  posts.forEach(post => {
    const card = document.createElement("a");
    card.className = "post-card";
    card.href = post.href;
    card.innerHTML = `
      <div class="post-header">
        <h3 class="post-title">${post.title}</h3>
        <span class="post-read-link">read →</span>
      </div>
      <div class="post-meta">
        <span class="meta-tag">${post.date}</span>
        <span class="meta-tag">${post.tag}</span>
        <span class="meta-tag">${post.readTime}</span>
      </div>
    `;
    grid.appendChild(card);
  });

  function toggleTheme() {
    document.body.classList.toggle("dark-theme");
    const isDark = document.body.classList.contains("dark-theme");
    const iconClass = isDark ? "fas fa-sun" : "fas fa-moon";
    document.getElementById("theme-icon").className = iconClass;
    document.getElementById("nav-theme-icon").className = iconClass;
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "dark") {
    document.body.classList.add("dark-theme");
    document.getElementById("theme-icon").className = "fas fa-sun";
    document.getElementById("nav-theme-icon").className = "fas fa-sun";
  }
</script>

</body>
</html>
